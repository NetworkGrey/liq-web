<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoyaltyIQ — what your loyalty programmes are actually worth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E0E0E;
    --bg-raised: #161616;
    --gold: #C9A84C;
    --white: #F2F1ED;
    --muted: #7A7A74;
    --border: #2A2A27;
    --danger: #C9603C;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-sans);
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: var(--gold); }

  button, input, textarea {
    font-family: inherit;
    border-radius: 0;
  }

  :focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  .wrap {
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
    padding: 24px 20px 64px;
    flex: 1;
  }

  /* ── Header ───────────────────────────────────────────── */

  header.app-header {
    margin-bottom: 32px;
  }

  header.app-header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }

  header.app-header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* ── Tabs ──────────────────────────────────────────────── */

  .tabs {
    display: flex;
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .tab-btn {
    flex: 1;
    background: var(--bg);
    color: var(--muted);
    border: none;
    padding: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border-right: 1px solid var(--border);
  }

  .tab-btn:last-child { border-right: none; }

  .tab-btn[aria-selected="true"] {
    background: var(--bg-raised);
    color: var(--gold);
  }

  /* ── Input area ───────────────────────────────────────── */

  .panel {
    border: 1px solid var(--border);
    background: var(--bg-raised);
    padding: 16px;
    margin-bottom: 24px;
  }

  .panel[hidden] { display: none; }

  label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 4px;
  }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 10px 12px;
    font-size: 0.95rem;
  }

  input[type="text"]:focus,
  input[type="number"]:focus {
    border-color: var(--gold);
  }

  .ask-row {
    display: flex;
    gap: 8px;
  }

  .ask-row input[type="text"] { flex: 1; }

  button.primary {
    background: var(--gold);
    color: var(--bg);
    border: 1px solid var(--gold);
    padding: 10px 18px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
  }

  button.primary:hover { background: #d8b961; }
  button.primary:disabled {
    background: var(--border);
    border-color: var(--border);
    color: var(--muted);
    cursor: not-allowed;
  }

  .remaining {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .spend-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  @media (max-width: 480px) {
    .spend-grid { grid-template-columns: 1fr; }
  }

  details.held-collapse {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-bottom: 16px;
  }

  details.held-collapse summary {
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .held-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .held-list label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--white);
    font-size: 0.9rem;
    margin-bottom: 0;
  }

  .held-list input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--gold);
  }

  /* ── Output area ──────────────────────────────────────── */

  #output {
    min-height: 40px;
  }

  .out-card {
    border: 1px solid var(--border);
    padding: 20px 16px;
    margin-bottom: 16px;
  }

  .out-figure {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 2.4rem;
    color: var(--gold);
    text-align: left;
    line-height: 1.1;
    margin: 0 0 8px;
    word-break: break-word;
  }

  .out-programme {
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 1rem;
    color: var(--white);
    margin: 0 0 12px;
  }

  .out-line {
    font-size: 0.92rem;
    color: var(--white);
    margin: 0 0 8px;
    line-height: 1.5;
  }

  .friction-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 2px 6px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .friction-low   { color: var(--gold); border-color: var(--gold); }
  .friction-medium{ color: var(--white); }
  .friction-high  { color: var(--muted); }

  .cta-link {
    display: inline-block;
    margin-top: 8px;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
  }

  .cta-link:hover { background: var(--gold); color: var(--bg); }

  .rec-row {
    border-top: 1px solid var(--border);
    padding: 12px 0;
  }

  .rec-row:first-of-type { border-top: none; padding-top: 0; }

  .rec-cat {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }

  .rec-amount {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--gold);
  }

  .total-uplift {
    border-top: 1px solid var(--border);
    margin-top: 12px;
    padding-top: 12px;
    font-family: var(--font-mono);
    font-size: 1rem;
    color: var(--white);
  }

  .full-explanation summary {
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 8px;
  }

  .full-explanation .prose {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 8px;
    white-space: pre-wrap;
  }

  .prose-only {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--white);
    white-space: pre-wrap;
  }

  .soft-message {
    font-size: 0.9rem;
    color: var(--muted);
    padding: 16px 0;
  }

  .loading {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--muted);
    padding: 16px 0;
  }

  footer.app-footer {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 24px 0 0;
  }
</style>
</head>
<body>

<div class="wrap">

  <header class="app-header">
    <h1>LoyaltyIQ</h1>
    <p>Find out what your loyalty programmes are actually worth.</p>
  </header>

  <div class="tabs" role="tablist" aria-label="Query mode">
    <button class="tab-btn" id="tab-ask-btn" role="tab" aria-selected="true" aria-controls="panel-ask" type="button">Ask</button>
    <button class="tab-btn" id="tab-review-btn" role="tab" aria-selected="false" aria-controls="panel-review" type="button">Review</button>
  </div>

  <section class="panel" id="panel-ask" role="tabpanel" aria-labelledby="tab-ask-btn">
    <label for="ask-input">Where are you shopping, or which programme are you considering?</label>
    <div class="ask-row">
      <input type="text" id="ask-input" placeholder="e.g. I'm at Checkers spending about R800" autocomplete="off">
      <button class="primary" id="ask-send" type="button">Ask</button>
    </div>
    <div class="remaining" id="ask-remaining" aria-hidden="true"></div>
  </section>

  <section class="panel" id="panel-review" role="tabpanel" aria-labelledby="tab-review-btn" hidden>
    <div class="spend-grid">
      <div>
        <label for="cat-groceries">Groceries</label>
        <input type="number" inputmode="numeric" min="0" id="cat-groceries" placeholder="R0 / month">
      </div>
      <div>
        <label for="cat-fuel">Fuel</label>
        <input type="number" inputmode="numeric" min="0" id="cat-fuel" placeholder="R0 / month">
      </div>
      <div>
        <label for="cat-pharmacy">Pharmacy &amp; health</label>
        <input type="number" inputmode="numeric" min="0" id="cat-pharmacy" placeholder="R0 / month">
      </div>
      <div>
        <label for="cat-dining">Dining out</label>
        <input type="number" inputmode="numeric" min="0" id="cat-dining" placeholder="R0 / month">
      </div>
      <div>
        <label for="cat-clothing">Clothing</label>
        <input type="number" inputmode="numeric" min="0" id="cat-clothing" placeholder="R0 / month">
      </div>
      <div>
        <label for="cat-travel">Travel</label>
        <input type="number" inputmode="numeric" min="0" id="cat-travel" placeholder="R0 / month">
      </div>
    </div>

    <details class="held-collapse">
      <summary>Programmes I already hold</summary>
      <div class="held-list" id="held-list">
        <label><input type="checkbox" value="FNB eBucks"> FNB eBucks</label>
        <label><input type="checkbox" value="Shoprite Xtra Savings"> Shoprite Xtra Savings</label>
        <label><input type="checkbox" value="Emirates Skywards"> Emirates Skywards</label>
        <label><input type="checkbox" value="Shell V+"> Shell V+</label>
        <label><input type="checkbox" value="YumDealz"> YumDealz</label>
        <label><input type="checkbox" value="Discovery Vitality"> Discovery Vitality</label>
      </div>
    </details>

    <button class="primary" id="review-send" type="button">Analyse</button>
  </section>

  <section id="output" aria-live="polite" aria-atomic="true"></section>

  <footer class="app-footer">Built by Network Grey · Powered by Anthropic Claude</footer>

</div>

<script>
(function () {
  "use strict";

  // ─── Config ─────────────────────────────────────────────
  // Empty string = same-origin relative requests (liq.html is served
  // by the same Flask app that exposes /chat and /analyse, so no
  // cross-origin call — and therefore no CORS allowlist dependency —
  // is needed). Set to an absolute origin here if liq.html is ever
  // hosted separately from the API.
  const API_BASE = "";

  const STORAGE_SESSION_KEY = "liq_session_id";
  const STORAGE_REMAINING_KEY = "liq_remaining";

  // ─── Safe storage (degrades gracefully if localStorage unavailable) ───

  const storage = {
    get(key) {
      try { return window.localStorage.getItem(key); } catch (e) { return null; }
    },
    set(key, value) {
      try { window.localStorage.setItem(key, value); } catch (e) { /* no-op */ }
    },
  };

  function makeId() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
      return window.crypto.randomUUID();
    }
    return "liq-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function getSessionId() {
    let id = storage.get(STORAGE_SESSION_KEY);
    if (!id) {
      id = makeId();
      storage.set(STORAGE_SESSION_KEY, id);
    }
    return id;
  }

  // ─── DOM refs ───────────────────────────────────────────

  const tabAskBtn = document.getElementById("tab-ask-btn");
  const tabReviewBtn = document.getElementById("tab-review-btn");
  const panelAsk = document.getElementById("panel-ask");
  const panelReview = document.getElementById("panel-review");

  const askInput = document.getElementById("ask-input");
  const askSend = document.getElementById("ask-send");
  const askRemaining = document.getElementById("ask-remaining");

  const reviewSend = document.getElementById("review-send");
  const heldList = document.getElementById("held-list");

  const output = document.getElementById("output");

  // ─── Tabs ───────────────────────────────────────────────

  function selectTab(which) {
    const askSelected = which === "ask";
    tabAskBtn.setAttribute("aria-selected", String(askSelected));
    tabReviewBtn.setAttribute("aria-selected", String(!askSelected));
    panelAsk.hidden = !askSelected;
    panelReview.hidden = askSelected;
  }

  tabAskBtn.addEventListener("click", function () { selectTab("ask"); });
  tabReviewBtn.addEventListener("click", function () { selectTab("review"); });

  // ─── Remaining-questions display ───────────────────────

  function renderRemaining(remaining) {
    if (typeof remaining !== "number") return;
    storage.set(STORAGE_REMAINING_KEY, String(remaining));
    askRemaining.textContent = remaining + " question" + (remaining === 1 ? "" : "s") + " left today";
  }

  (function initRemaining() {
    const stored = storage.get(STORAGE_REMAINING_KEY);
    if (stored !== null) {
      askRemaining.textContent = stored + " question" + (stored === "1" ? "" : "s") + " left today";
    }
  })();

  // ─── Helpers ────────────────────────────────────────────

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // Render a constrained markdown subset (**bold** only) safely,
  // since the LLM reply is plain prose, not arbitrary HTML.
  function renderProse(text) {
    const escaped = escapeHtml(text || "");
    return escaped.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  }

  // Pull the first "R1,234" / "R1234.50" figure out of a prose string
  // for the large ledger-style display. Returns null if none found.
  function extractLeadFigure(text) {
    if (!text) return null;
    const match = text.match(/R\s?-?\d[\d,]*(\.\d+)?/);
    return match ? match[0].replace(/\s+/g, "") : null;
  }

  function setLoading() {
    output.innerHTML = '<div class="loading">Thinking…</div>';
  }

  function setSoftMessage(msg) {
    output.innerHTML = '<div class="soft-message">' + escapeHtml(msg) + "</div>";
  }

  function frictionTagHtml(level) {
    if (!level) return "";
    const norm = String(level).toLowerCase();
    const cls = norm === "low" ? "friction-low" : norm === "high" ? "friction-high" : "friction-medium";
    return '<span class="friction-tag ' + cls + '">' + escapeHtml(norm) + "</span>";
  }

  // ─── Output renderers ──────────────────────────────────

  // Modes 1 and 3 (from /chat): API only returns prose + mode today.
  // Feature the leading rand figure (the signature element) and show
  // the full reply beneath it.
  function renderChatOutput(data) {
    const text = data.response || "";
    const figure = extractLeadFigure(text);

    let html = '<div class="out-card">';
    if (figure) {
      html += '<div class="out-figure">' + escapeHtml(figure) + "</div>";
    }
    html += '<div class="prose-only">' + renderProse(text) + "</div>";
    html += "</div>";

    output.innerHTML = html;
  }

  // Mode 2 (from /analyse). `routing` is the structured contract from
  // resolve_spend_routing() — empty {} until the engine is live, in
  // which case we render prose only, per the brief.
  function renderAnalyseOutput(data) {
    const routing = data.routing || {};
    const hasRouting = routing && typeof routing === "object" && Object.keys(routing).length > 0;

    if (!hasRouting) {
      output.innerHTML = '<div class="out-card"><div class="prose-only">' + renderProse(data.response || "") + "</div></div>";
      return;
    }

    let html = '<div class="out-card">';

    if (typeof routing.total_uplift_zar === "number") {
      html += '<div class="out-figure">R' + escapeHtml(String(routing.total_uplift_zar)) + "</div>";
    }
    if (routing.summary) {
      html += '<div class="out-line">' + renderProse(routing.summary) + "</div>";
    }

    if (Array.isArray(routing.recommendations) && routing.recommendations.length) {
      routing.recommendations.forEach(function (rec) {
        html += '<div class="rec-row">';
        if (rec.category) {
          html += '<div class="rec-cat">' + escapeHtml(rec.category) + "</div>";
        }
        if (rec.recommended_programme) {
          html += '<div class="out-programme">' + escapeHtml(rec.recommended_programme) + "</div>";
        }
        if (typeof rec.monthly_return_zar === "number") {
          html += '<div class="rec-amount">R' + escapeHtml(String(rec.monthly_return_zar)) + "</div>";
        }
        html += frictionTagHtml(rec.friction);
        if (rec.action) {
          html += '<div class="out-line">' + escapeHtml(rec.action) + "</div>";
        }
        if (rec.vs_current) {
          html += '<div class="out-line">' + escapeHtml(rec.vs_current) + "</div>";
        }
        if (rec.signup_url) {
          html += '<a class="cta-link" href="' + escapeHtml(rec.signup_url) + '" target="_blank" rel="noopener">Sign up</a>';
        }
        html += "</div>";
      });
    }

    if (typeof routing.total_uplift_zar === "number") {
      html += '<div class="total-uplift">Total uplift: R' + escapeHtml(String(routing.total_uplift_zar)) + "/month</div>";
    }

    if (data.response) {
      html += '<details class="full-explanation"><summary>Full explanation</summary><div class="prose">' + renderProse(data.response) + "</div></details>";
    }

    html += "</div>";
    output.innerHTML = html;
  }

  // ─── Error handling ─────────────────────────────────────

  function handleHttpError(status) {
    if (status === 429) {
      setSoftMessage("You've used your 10 daily questions. Come back tomorrow.");
    } else {
      setSoftMessage("LIQ is unavailable right now. Try again in a moment.");
    }
  }

  function handleNetworkError() {
    setSoftMessage("LIQ is unavailable right now. Try again in a moment.");
  }

  // ─── Requests ───────────────────────────────────────────

  function postJson(path, body) {
    return fetch(API_BASE + path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
  }

  function sendAsk() {
    const message = askInput.value.trim();
    if (!message) return;

    askSend.disabled = true;
    setLoading();

    postJson("/chat", {
      message: message,
      session_id: getSessionId(),
      user_spec: {},
    })
      .then(function (res) {
        if (!res.ok) {
          handleHttpError(res.status);
          return null;
        }
        return res.json();
      })
      .then(function (data) {
        if (!data) return;
        if (typeof data.remaining === "number") renderRemaining(data.remaining);
        if (!data.response) {
          setSoftMessage("No advice returned. Try rephrasing your question.");
          return;
        }
        renderChatOutput(data);
        askInput.value = "";
      })
      .catch(handleNetworkError)
      .finally(function () { askSend.disabled = false; });
  }

  function collectCategories() {
    const ids = ["groceries", "fuel", "pharmacy", "dining", "clothing", "travel"];
    const categories = {};
    ids.forEach(function (key) {
      const el = document.getElementById("cat-" + key);
      const val = parseFloat(el.value);
      if (!isNaN(val) && val > 0) categories[key] = val;
    });
    return categories;
  }

  function collectHeld() {
    return Array.from(heldList.querySelectorAll("input[type=checkbox]:checked")).map(function (cb) {
      return cb.value;
    });
  }

  function sendReview() {
    const categories = collectCategories();
    if (Object.keys(categories).length === 0) {
      setSoftMessage("Add at least one monthly spend amount to analyse.");
      return;
    }

    reviewSend.disabled = true;
    setLoading();

    postJson("/analyse", {
      message: "",
      user_spec: {
        categories: categories,
        programmes_held: collectHeld(),
      },
    })
      .then(function (res) {
        if (!res.ok) {
          handleHttpError(res.status);
          return null;
        }
        return res.json();
      })
      .then(function (data) {
        if (!data) return;
        if (!data.response && (!data.routing || Object.keys(data.routing).length === 0)) {
          setSoftMessage("No advice returned. Try rephrasing your question.");
          return;
        }
        renderAnalyseOutput(data);
      })
      .catch(handleNetworkError)
      .finally(function () { reviewSend.disabled = false; });
  }

  // ─── Wire up ────────────────────────────────────────────

  askSend.addEventListener("click", sendAsk);
  askInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") sendAsk();
  });
  reviewSend.addEventListener("click", sendReview);
})();
</script>

</body>
</html>
