<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoyaltyIQ — what your loyalty programmes are actually worth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-page:        #F5F7FA;
      --bg-surface:     #FFFFFF;
      --bg-surface-2:   #EEF2F7;
      --border:         #CBD5E1;
      --border-strong:  #94A3B8;
      --ink-primary:    #111827;
      --ink-secondary:  #4B5563;
      --ink-muted:      #94A3B8;
      --accent:         #2563EB;
      --accent-hover:   #1D4ED8;
      --accent-subtle:  #EFF6FF;
      --friction-low:   #2563EB;
      --friction-mid:   #D97706;
      --friction-high:  #DC2626;
      --divider-rule:   #CBD5E1;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-page);
      color: var(--ink-primary);
      font-family: Inter, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 32px 24px 48px;
    }

    #app {
      max-width: 700px;
      margin: 0 auto;
    }

    /* Header */
    header { margin-bottom: 32px; }
    .logo { font-family: Rajdhani, sans-serif; font-size: 28px; font-weight: 600; color: var(--ink-primary); }
    .logo .accent { color: var(--accent); }
    .tagline { font-size: 13px; color: var(--ink-secondary); margin-top: 4px; }

    /* Tabs */
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab {
      font-family: Rajdhani, sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 10px 20px;
      color: var(--ink-muted);
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      cursor: pointer;
      margin-bottom: -1px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--ink-secondary); }

    /* Input area */
    #input-area { margin-bottom: 32px; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; font-family: 'JetBrains Mono', monospace; }

    .input-row { display: flex; gap: 0; }
    .input-row input { flex: 1; }

    input[type="text"], input[type="number"] {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 9px 12px;
      font-family: Inter, sans-serif;
      font-size: 14px;
      color: var(--ink-primary);
      width: 100%;
    }
    input:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
      border-color: var(--accent);
    }
    input::placeholder { color: var(--ink-muted); }

    /* Spend grid */
    .spend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; margin-bottom: 16px; }
    .field-group label { margin-bottom: 4px; }

    /* Collapsible */
    .collapsible { margin-bottom: 16px; }
    .collapsible-toggle {
      background: none;
      border: none;
      font-family: Inter, sans-serif;
      font-size: 13px;
      color: var(--ink-secondary);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .collapsible-toggle:hover { color: var(--ink-primary); }
    .chevron { display: inline-block; transition: transform 0.15s ease; font-size: 16px; line-height: 1; }
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; font-size: 13px; color: var(--ink-secondary); }
    .checkbox-grid label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

    /* Buttons */
    button[id$="-btn"] {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0;
      padding: 9px 20px;
      font-family: Inter, sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button[id$="-btn"]:hover { background: var(--accent-hover); }
    button[id$="-btn"]:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Counter */
    .counter { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-muted); margin-top: 8px; }

    /* Output */
    #output-area { border-top: 1px solid var(--border); padding-top: 24px; min-height: 0; }

    /* Hero number */
    .hero-number {
      font-family: Rajdhani, sans-serif;
      font-size: 48px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .hero-rule { border: none; border-top: 1px solid var(--border); margin-bottom: 16px; }

    /* Prose */
    .prose-body { font-size: 14px; line-height: 1.7; color: var(--ink-primary); }
    .prose-body strong { font-weight: 500; }
    .section-rule { border: none; border-top: 1px solid var(--divider-rule); margin: 16px 0; }

    /* Routing */
    .routing-summary { font-family: Rajdhani, sans-serif; font-size: 20px; font-weight: 500; color: var(--ink-primary); margin-bottom: 16px; }
    .routing-list { border-top: 1px solid var(--border); }
    .routing-row { display: grid; grid-template-columns: 120px 1fr 80px 70px; gap: 8px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .routing-category { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .routing-programme { font-weight: 500; color: var(--ink-primary); }
    .routing-return { font-family: Rajdhani, sans-serif; font-size: 20px; font-weight: 600; color: var(--accent); }
    .routing-friction { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
    .friction-low { color: var(--friction-low); }
    .friction-medium { color: var(--friction-mid); }
    .friction-high { color: var(--friction-high); }
    .routing-cta { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .routing-cta:hover { text-decoration: underline; }

    /* States */
    .thinking { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-muted); padding: 16px 0; }
    .error-msg { font-size: 13px; color: var(--friction-high); padding: 12px 0; }

    /* Footer */
    footer { max-width: 700px; margin: 48px auto 0; font-size: 11px; color: var(--ink-muted); display: flex; gap: 8px; }
    .sep { color: var(--border); }

    /* Accessibility */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) { .chevron { transition: none; } }

    /* Mobile */
    @media (max-width: 600px) {
      body { padding: 20px 16px 40px; }
      .spend-grid { grid-template-columns: 1fr; }
      .routing-row { grid-template-columns: 1fr 1fr; }
      .hero-number { font-size: 36px; }
    }
  </style>
</head>
<body>

  <div id="app">

    <!-- HEADER -->
    <header>
      <div class="logo">Loyalty<span class="accent">IQ</span></div>
      <p class="tagline">Find out what your loyalty programmes are actually worth.</p>
    </header>

    <!-- INPUT AREA -->
    <section id="input-area">

      <!-- TABS -->
      <div class="tab-bar" role="tablist">
        <button class="tab active" role="tab" id="tab-ask" aria-selected="true" aria-controls="panel-ask">Ask</button>
        <button class="tab" role="tab" id="tab-review" aria-selected="false" aria-controls="panel-review">Review</button>
      </div>

      <!-- ASK PANEL -->
      <div id="panel-ask" role="tabpanel" aria-labelledby="tab-ask">
        <label for="ask-input">Where are you shopping, or which programme are you considering?</label>
        <div class="input-row">
          <input type="text" id="ask-input" placeholder="e.g. I'm at Checkers spending about R800" autocomplete="off">
          <button id="ask-btn" type="button">Ask</button>
        </div>
        <div id="ask-counter" class="counter" aria-live="polite"></div>
      </div>

      <!-- REVIEW PANEL -->
      <div id="panel-review" role="tabpanel" aria-labelledby="tab-review" hidden>
        <p class="panel-label">Enter your monthly spend per category.</p>
        <div class="spend-grid">
          <div class="field-group">
            <label for="cat-groceries">Groceries</label>
            <input type="number" id="cat-groceries" placeholder="0" min="0" inputmode="numeric">
          </div>
          <div class="field-group">
            <label for="cat-fuel">Fuel</label>
            <input type="number" id="cat-fuel" placeholder="0" min="0" inputmode="numeric">
          </div>
          <div class="field-group">
            <label for="cat-pharmacy">Pharmacy &amp; health</label>
            <input type="number" id="cat-pharmacy" placeholder="0" min="0" inputmode="numeric">
          </div>
          <div class="field-group">
            <label for="cat-dining">Dining out</label>
            <input type="number" id="cat-dining" placeholder="0" min="0" inputmode="numeric">
          </div>
          <div class="field-group">
            <label for="cat-clothing">Clothing</label>
            <input type="number" id="cat-clothing" placeholder="0" min="0" inputmode="numeric">
          </div>
          <div class="field-group">
            <label for="cat-travel">Travel</label>
            <input type="number" id="cat-travel" placeholder="0" min="0" inputmode="numeric">
          </div>
        </div>

        <!-- Programmes held — collapsible -->
        <div class="collapsible">
          <button class="collapsible-toggle" type="button" aria-expanded="false" aria-controls="programmes-held">
            <span class="chevron">›</span> Programmes I already hold
          </button>
          <div id="programmes-held" hidden>
            <div class="checkbox-grid">
              <label><input type="checkbox" value="FNB eBucks"> FNB eBucks</label>
              <label><input type="checkbox" value="Shoprite Xtra Savings"> Shoprite Xtra Savings</label>
              <label><input type="checkbox" value="Emirates Skywards"> Emirates Skywards</label>
              <label><input type="checkbox" value="Shell V+"> Shell V+</label>
              <label><input type="checkbox" value="YumDealz"> YumDealz</label>
              <label><input type="checkbox" value="Discovery Vitality"> Discovery Vitality</label>
            </div>
          </div>
        </div>

        <button id="analyse-btn" type="button">Analyse</button>
        <div id="review-counter" class="counter" aria-live="polite"></div>
      </div>

    </section>

    <!-- OUTPUT AREA -->
    <section id="output-area" aria-live="polite" aria-label="LIQ response">
      <!-- Populated by JS -->
    </section>

  </div>

  <!-- FOOTER -->
  <footer>
    <span>Built by Network Grey</span>
    <span class="sep">·</span>
    <span>Powered by Anthropic Claude</span>
  </footer>

  <script>
    const API_BASE = "https://web-production-0a66a.up.railway.app";
    const DAILY_LIMIT = 10;

    function getSessionId() {
      try {
        let id = localStorage.getItem("liq_session_id");
        if (!id) {
          id = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
          localStorage.setItem("liq_session_id", id);
        }
        return id;
      } catch { return Math.random().toString(36).slice(2); }
    }

    function getRemaining() {
      try { return parseInt(localStorage.getItem("liq_remaining") ?? DAILY_LIMIT, 10); }
      catch { return DAILY_LIMIT; }
    }

    function setRemaining(n) {
      try { localStorage.setItem("liq_remaining", n); } catch {}
      updateCounters(n);
    }

    function updateCounters(n) {
      const text = `${n} / ${DAILY_LIMIT} queries remaining`;
      document.getElementById("ask-counter").textContent = text;
      document.getElementById("review-counter").textContent = text;
    }

    function switchTab(active) {
      // active = "ask" | "review"
      ["ask", "review"].forEach(t => {
        const tab = document.getElementById(`tab-${t}`);
        const panel = document.getElementById(`panel-${t}`);
        const isActive = t === active;
        tab.classList.toggle("active", isActive);
        tab.setAttribute("aria-selected", isActive);
        panel.hidden = !isActive;
      });
      clearOutput();           // FIX 2: clear output on tab switch
      window.scrollTo(0, 0);  // FIX 1: scroll to top on tab switch
    }

    function clearOutput() {
      document.getElementById("output-area").innerHTML = "";
    }

    function setLoading(isLoading) {
      document.getElementById("ask-btn").disabled = isLoading;
      document.getElementById("analyse-btn").disabled = isLoading;
      if (isLoading) {
        document.getElementById("output-area").innerHTML =
          `<p class="thinking">Analysing<span class="dots"></span></p>`;
      }
    }

    function renderResponse(data, mode) {
      const area = document.getElementById("output-area");
      area.innerHTML = "";

      // Routing output (Mode 2 — only when routing is populated)
      if (mode === "2" && data.routing && data.routing.recommendations?.length) {
        area.appendChild(renderRouting(data.routing));
      }

      // LLM prose
      if (data.response) {
        area.appendChild(renderProse(data.response, mode));
      }
    }

    function renderProse(text, mode) {
      const div = document.createElement("div");
      div.className = "prose-output";

      // FIX 3: replace --- with <hr>
      const cleaned = text
        .replace(/^---+$/gm, '<hr class="section-rule">')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>');

      // Extract hero number for Mode 1 and 3
      const randMatch = cleaned.match(/R(\d[\d,]+)/);
      if ((mode === "1" || mode === "3") && randMatch) {
        const hero = document.createElement("div");
        hero.className = "hero-number";
        hero.textContent = `R${randMatch[1]}`;
        div.appendChild(hero);
        const rule = document.createElement("hr");
        rule.className = "hero-rule";
        div.appendChild(rule);
      }

      const prose = document.createElement("div");
      prose.className = "prose-body";
      prose.innerHTML = cleaned;
      div.appendChild(prose);

      return div;
    }

    function renderRouting(routing) {
      const div = document.createElement("div");
      div.className = "routing-output";

      if (routing.summary) {
        const summary = document.createElement("div");
        summary.className = "routing-summary";
        summary.textContent = routing.summary;
        div.appendChild(summary);
      }

      if (routing.recommendations?.length) {
        const list = document.createElement("div");
        list.className = "routing-list";
        routing.recommendations.forEach(rec => {
          const row = document.createElement("div");
          row.className = "routing-row";
          row.innerHTML = `
            <div class="routing-category">${rec.category}</div>
            <div class="routing-programme">${rec.recommended_programme}</div>
            <div class="routing-return">R${rec.monthly_return_zar}</div>
            <div class="routing-friction friction-${rec.friction}">${rec.friction.toUpperCase()}</div>
            <div class="routing-action">${rec.action}</div>
            ${rec.signup_url ? `<a class="routing-cta" href="${rec.signup_url}" target="_blank" rel="noopener">Sign up</a>` : ""}
          `;
          list.appendChild(row);
        });
        div.appendChild(list);
      }

      return div;
    }

    async function submitAsk() {
      const input = document.getElementById("ask-input");
      const message = input.value.trim();
      if (!message) return;

      const remaining = getRemaining();
      if (remaining <= 0) {
        showError("You've used your 10 daily queries. Come back tomorrow.");
        return;
      }

      setLoading(true);
      input.value = "";

      try {
        const res = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            session_id: getSessionId(),
            user_spec: {}
          })
        });

        if (res.status === 429) {
          setRemaining(0);
          showError("You've used your 10 daily queries. Come back tomorrow.");
          return;
        }

        const data = await res.json();
        setRemaining(data.remaining ?? remaining - 1);
        renderResponse(data, data.mode ?? "1");

      } catch {
        showError("LIQ is unavailable right now. Try again in a moment.");
      } finally {
        setLoading(false);
      }
    }

    async function submitAnalyse() {
      const remaining = getRemaining();
      if (remaining <= 0) {
        showError("You've used your 10 daily queries. Come back tomorrow.");
        return;
      }

      const categories = {
        groceries: parseFloat(document.getElementById("cat-groceries").value) || 0,
        fuel:      parseFloat(document.getElementById("cat-fuel").value) || 0,
        pharmacy:  parseFloat(document.getElementById("cat-pharmacy").value) || 0,
        dining:    parseFloat(document.getElementById("cat-dining").value) || 0,
        clothing:  parseFloat(document.getElementById("cat-clothing").value) || 0,
        travel:    parseFloat(document.getElementById("cat-travel").value) || 0,
      };

      const programmes_held = Array.from(
        document.querySelectorAll("#programmes-held input:checked")
      ).map(el => el.value);

      setLoading(true);

      try {
        const res = await fetch(`${API_BASE}/analyse`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: "",
            user_spec: { categories, programmes_held }
          })
        });

        if (res.status === 429) {
          setRemaining(0);
          showError("You've used your 10 daily queries. Come back tomorrow.");
          return;
        }

        const data = await res.json();
        setRemaining(remaining - 1);
        renderResponse(data, "2");

      } catch {
        showError("LIQ is unavailable right now. Try again in a moment.");
      } finally {
        setLoading(false);
      }
    }

    function showError(msg) {
      const area = document.getElementById("output-area");
      area.innerHTML = `<p class="error-msg">${msg}</p>`;
    }

    function initCollapsible() {
      document.querySelectorAll(".collapsible-toggle").forEach(btn => {
        btn.addEventListener("click", () => {
          const target = document.getElementById(btn.getAttribute("aria-controls"));
          const expanded = btn.getAttribute("aria-expanded") === "true";
          btn.setAttribute("aria-expanded", !expanded);
          target.hidden = expanded;
          btn.querySelector(".chevron").style.transform = expanded ? "rotate(0deg)" : "rotate(90deg)";
        });
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      updateCounters(getRemaining());
      initCollapsible();

      document.getElementById("tab-ask").addEventListener("click", () => switchTab("ask"));
      document.getElementById("tab-review").addEventListener("click", () => switchTab("review"));

      document.getElementById("ask-btn").addEventListener("click", submitAsk);
      document.getElementById("ask-input").addEventListener("keydown", e => {
        if (e.key === "Enter") submitAsk();
      });

      document.getElementById("analyse-btn").addEventListener("click", submitAnalyse);
    });
  </script>
</body>
</html>
